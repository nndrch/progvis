<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>datavis_00 – CSV Visualizer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Verdana, sans-serif;
      background: #1a1a1a;
      color: #ddd;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px;
      gap: 20px;
    }

    h1 {
      font-size: 14px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #888;
    }

    /* ── Controls bar ── */
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      justify-content: center;
      width: 100%;
      max-width: 900px;
    }

    label.upload-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: #333;
      border: 1px solid #555;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      transition: background 0.15s;
    }
    label.upload-btn:hover { background: #444; }
    label.upload-btn input { display: none; }

    .sep { color: #444; }

    .control-group {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
    }
    .control-group select,
    .control-group input[type="number"] {
      background: #2a2a2a;
      border: 1px solid #555;
      border-radius: 4px;
      color: #ddd;
      padding: 4px 8px;
      font-size: 12px;
    }
    .control-group input[type="number"] { width: 60px; }

    .filename {
      font-size: 11px;
      color: #888;
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ── Column picker (shown after upload) ── */
    .col-picker {
      display: none;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      justify-content: center;
      width: 100%;
      max-width: 900px;
      background: #222;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 12px;
    }
    .col-picker.visible { display: flex; }
    .col-picker select {
      background: #2a2a2a;
      border: 1px solid #555;
      border-radius: 4px;
      color: #ddd;
      padding: 4px 8px;
      font-size: 12px;
    }

    /* ── Canvas wrapper ── */
    .canvas-wrapper {
      position: relative;
      width: 100%;
      max-width: 900px;
    }

    canvas {
      display: block;
      width: 100%;
      height: auto;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.5);
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: #222;
      border: 2px dashed #444;
      border-radius: 8px;
      padding: 60px 40px;
      text-align: center;
      color: #666;
      font-size: 13px;
    }
    .empty-state svg { opacity: 0.3; }

    /* ── Error ── */
    .error-msg {
      display: none;
      color: #f66;
      font-size: 12px;
      text-align: center;
    }
    .error-msg.visible { display: block; }
  </style>
</head>
<body>

  <h1>datavis_00 &mdash; CSV Visualizer</h1>

  <!-- Controls -->
  <div class="controls">
    <label class="upload-btn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="17 8 12 3 7 8"/>
        <line x1="12" y1="3" x2="12" y2="15"/>
      </svg>
      Upload CSV
      <input type="file" id="csvInput" accept=".csv,.tsv,.txt" />
    </label>

    <span class="filename" id="filename">no file selected</span>

    <span class="sep">|</span>

    <div class="control-group">
      <label for="separator">Separator</label>
      <select id="separator">
        <option value=",">Comma (,)</option>
        <option value=";">Semicolon (;)</option>
        <option value="&#9;">Tab</option>
        <option value="|">Pipe (|)</option>
      </select>
    </div>

    <div class="control-group">
      <label for="hasHeader">Header row</label>
      <select id="hasHeader">
        <option value="1">Yes</option>
        <option value="0">No</option>
      </select>
    </div>

    <div class="control-group">
      <label for="excludeKey">Exclude row containing</label>
      <input type="text" id="excludeKey" value="Total" style="width:80px;background:#2a2a2a;border:1px solid #555;border-radius:4px;color:#ddd;padding:4px 8px;font-size:12px;" placeholder="e.g. Total" />
    </div>
  </div>

  <!-- Column picker -->
  <div class="col-picker" id="colPicker">
    <div class="control-group">
      <label for="labelCol">Label column</label>
      <select id="labelCol"></select>
    </div>
    <div class="control-group">
      <label for="valueCol">Value column</label>
      <select id="valueCol"></select>
    </div>
    <div class="control-group">
      <label for="barColor">Color mode</label>
      <select id="barColor">
        <option value="hsb">Rainbow (HSB)</option>
        <option value="mono">Monochrome</option>
        <option value="cool">Cool blues</option>
        <option value="warm">Warm reds</option>
      </select>
    </div>
    <button id="renderBtn" style="padding:6px 14px;background:#3a6;border:none;border-radius:4px;color:#fff;font-size:12px;cursor:pointer;">Render</button>
  </div>

  <p class="error-msg" id="errorMsg"></p>

  <!-- Canvas / empty state -->
  <div class="canvas-wrapper" id="canvasWrapper">
    <div class="empty-state" id="emptyState">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/>
        <line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="9" x2="9" y2="21"/>
      </svg>
      Upload a CSV file to visualize it as a horizontal bar chart
    </div>
    <canvas id="chart" style="display:none;"></canvas>
  </div>

<script>
// ─── State ────────────────────────────────────────────────────────────────────
let parsedRows = [];   // array of arrays (raw strings)
let headers    = [];   // column headers (or col0, col1…)

// ─── DOM refs ─────────────────────────────────────────────────────────────────
const csvInput   = document.getElementById('csvInput');
const filename   = document.getElementById('filename');
const separator  = document.getElementById('separator');
const hasHeader  = document.getElementById('hasHeader');
const excludeKey = document.getElementById('excludeKey');
const colPicker  = document.getElementById('colPicker');
const labelCol   = document.getElementById('labelCol');
const valueCol   = document.getElementById('valueCol');
const barColor   = document.getElementById('barColor');
const renderBtn  = document.getElementById('renderBtn');
const canvas     = document.getElementById('chart');
const ctx        = canvas.getContext('2d');
const emptyState = document.getElementById('emptyState');
const errorMsg   = document.getElementById('errorMsg');

// ─── CSV parse ────────────────────────────────────────────────────────────────
function parseCSV(text, sep) {
  return text.trim().split('\n').map(l => l.split(sep).map(c => c.trim().replace(/^"|"$/g, '')));
}

function loadColumns() {
  const sep = separator.value;
  const header = hasHeader.value === '1';
  parsedRows = parseCSV(document.currentCSVText, sep);
  if (parsedRows.length === 0) return;

  if (header) {
    headers = parsedRows[0];
    parsedRows = parsedRows.slice(1);
  } else {
    headers = parsedRows[0].map((_, i) => `col${i}`);
  }

  // populate selects
  [labelCol, valueCol].forEach(sel => {
    sel.innerHTML = headers.map((h, i) => `<option value="${i}">${h}</option>`).join('');
  });
  // default: label=0, value=1 (if exists)
  labelCol.value = 0;
  valueCol.value = Math.min(1, headers.length - 1);

  colPicker.classList.add('visible');
}

csvInput.addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  filename.textContent = file.name;
  showError('');

  const reader = new FileReader();
  reader.onload = ev => {
    document.currentCSVText = ev.target.result;
    loadColumns();
    renderChart();
  };
  reader.readAsText(file);
});

// Re-parse when separator or header setting changes
[separator, hasHeader].forEach(el => el.addEventListener('change', () => {
  if (!document.currentCSVText) return;
  loadColumns();
  renderChart();
}));

[excludeKey, barColor, labelCol, valueCol].forEach(el => el.addEventListener('change', () => {
  if (!document.currentCSVText) return;
  renderChart();
}));

renderBtn.addEventListener('click', renderChart);

// ─── Color helpers ────────────────────────────────────────────────────────────
function hsb(h, s, b, a = 1) {
  // h: 0-1, s: 0-1, b: 0-1
  const H = h * 360;
  const S = s * 100;
  const L = (b / 2) * (2 - s);
  const sl = s * b / (1 - Math.abs(2 * L - b));
  return `hsla(${H}, ${(sl*100).toFixed(1)}%, ${(L*100).toFixed(1)}%, ${a})`;
}

function getColor(mode, t, alpha = 0.75) {
  switch (mode) {
    case 'hsb':  return hsb(t, 1, 1, alpha);
    case 'mono': return `rgba(80,80,80,${alpha})`;
    case 'cool': return hsb(0.55 + t * 0.15, 0.8, 0.9, alpha);
    case 'warm': return hsb(t * 0.12, 0.85, 0.95, alpha);
    default:     return hsb(t, 1, 1, alpha);
  }
}

// ─── Render ───────────────────────────────────────────────────────────────────
function showError(msg) {
  errorMsg.textContent = msg;
  errorMsg.classList.toggle('visible', !!msg);
}

function renderChart() {
  if (!parsedRows.length) return;

  const lCol = parseInt(labelCol.value, 10);
  const vCol = parseInt(valueCol.value, 10);
  const excl = excludeKey.value.trim().toLowerCase();
  const mode = barColor.value;

  // Filter & parse rows
  const rows = parsedRows
    .filter(r => r.length > Math.max(lCol, vCol))
    .filter(r => !excl || !r[lCol].toLowerCase().includes(excl))
    .map(r => ({ label: r[lCol], value: parseFloat(r[vCol].replace(/[^0-9.\-]/g, '')) }))
    .filter(r => !isNaN(r.value));

  if (rows.length === 0) {
    showError('No valid rows found. Check column selection and separator.');
    return;
  }
  showError('');

  // Layout constants (match original Processing sketch proportions)
  const ROW_H   = 30;
  const PAD_T   = 50;   // top padding
  const PAD_B   = 40;   // bottom padding
  const PAD_L   = 20;   // left edge
  const COL_W   = 200;  // label column width
  const BAR_PAD = 6;    // gap between rows
  const VALUE_PAD = 10; // gap between bar end and value label

  const maxVal   = Math.max(...rows.map(r => r.value));
  const W        = 900;
  const BAR_AREA = W - PAD_L - COL_W - 60; // px available for bars
  const scale    = BAR_AREA / maxVal;
  const H        = PAD_T + rows.length * (ROW_H + BAR_PAD) + PAD_B;

  // Set canvas resolution (2x for retina)
  const dpr = window.devicePixelRatio || 1;
  canvas.width  = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';
  ctx.scale(dpr, dpr);

  // Background
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, W, H);

  // Title / filename
  ctx.fillStyle = '#999';
  ctx.font = '11px Verdana';
  ctx.fillText(filename.textContent, PAD_L, 22);

  // Grid line at x=0 of bars
  const BAR_X = PAD_L + COL_W;
  ctx.strokeStyle = '#e0e0e0';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(BAR_X, PAD_T - 10);
  ctx.lineTo(BAR_X, H - PAD_B + 10);
  ctx.stroke();

  // Draw rows
  const n = rows.length;
  rows.forEach((row, i) => {
    const t = n > 1 ? i / (n - 1) : 0;
    const y = PAD_T + i * (ROW_H + BAR_PAD);
    const barW = Math.max(0, row.value * scale);

    // Bar
    ctx.fillStyle = getColor(mode, t, 0.75);
    ctx.fillRect(BAR_X, y, barW, ROW_H - 2);

    // Label (left)
    ctx.fillStyle = '#444';
    ctx.font = '11px Verdana';
    ctx.textBaseline = 'middle';
    ctx.textAlign = 'right';
    ctx.fillText(truncate(row.label, 28), BAR_X - 8, y + (ROW_H - 2) / 2);

    // Value (right of bar)
    ctx.fillStyle = '#666';
    ctx.textAlign = 'left';
    ctx.fillText(formatNum(row.value), BAR_X + barW + VALUE_PAD, y + (ROW_H - 2) / 2);
  });

  // Show canvas, hide empty state
  emptyState.style.display = 'none';
  canvas.style.display = 'block';
}

function truncate(str, max) {
  return str.length > max ? str.slice(0, max - 1) + '…' : str;
}

function formatNum(n) {
  if (!isFinite(n)) return String(n);
  if (Number.isInteger(n)) return n.toLocaleString();
  return n.toLocaleString(undefined, { maximumFractionDigits: 2 });
}

// ─── Drag & drop ─────────────────────────────────────────────────────────────
document.body.addEventListener('dragover', e => e.preventDefault());
document.body.addEventListener('drop', e => {
  e.preventDefault();
  const file = e.dataTransfer.files[0];
  if (!file) return;
  filename.textContent = file.name;
  const reader = new FileReader();
  reader.onload = ev => {
    document.currentCSVText = ev.target.result;
    loadColumns();
    renderChart();
  };
  reader.readAsText(file);
});

// Load bundled CSV on startup so the page is useful immediately
(async () => {
  const defaultCSV = `0 up to 3 years of age,291098,persons
4 years of age,73887,persons
5 years of age,75778,persons
6 years of age,76246,persons
7 up to 9 years of age,243514,persons
10 up to 14 years of age,466608,persons
15 up to 19 years of age,464110,persons
15 up to 17 years of age,277074,persons
18 up to 19 years of age,187036,persons
20 up to 24 years of age,508746,persons
25 up to 29 years of age,551477,persons
30 up to 39 years of age,992815,persons
40 up to 49 years of age,876347,persons
50 up to 59 years of age,759865,persons
60 years of age or over,939955,persons
Total,6320446,persons`;
  document.currentCSVText = defaultCSV;
  filename.textContent = 'pop-rj.csv (default)';
  loadColumns();
  renderChart();
})();
</script>
</body>
</html>
